# /etc/grafana/provisioning/alerting/notification-policy.yaml
# Grafana 13.0.1 — Notification policy provisioning
# Source: https://grafana.com/docs/grafana/latest/alerting/set-up/provision-alerting-resources/

apiVersion: 1

policies:
  - orgId: 1
    receiver: slack-ops              # default receiver
    group_by:
      - alertname
      - grafana_folder
      - cluster
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:

      # Critical alerts: fast path to PagerDuty
      - receiver: pagerduty-critical
        matchers:
          - severity = critical
        group_wait: 10s
        repeat_interval: 1h
        continue: false

      # Database alerts: DBA Slack channel
      - receiver: slack-dba
        matchers:
          - team = dba
        repeat_interval: 2h

      # Info alerts: email only
      - receiver: email-ops
        matchers:
          - severity = info
        repeat_interval: 24h

