# /etc/grafana/provisioning/alerting/contact-points.yaml
# Grafana 13.0.1 — Alerting contact points provisioning
# Source: https://grafana.com/docs/grafana/latest/alerting/set-up/provision-alerting-resources/

apiVersion: 1

contactPoints:

  - orgId: 1
    name: slack-ops
    receivers:
      - uid: slack-ops-receiver
        type: slack
        settings:
          url: ${SLACK_WEBHOOK_URL}          # from env var or Grafana secret
          recipient: '#alerts'
          title: |
            {{ if eq .Status "firing" }}:fire:{{ else }}:white_check_mark:{{ end }}
            [{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}
          text: |
            {{ range .Alerts }}
            *{{ .Annotations.summary }}*
            {{ .Annotations.description }}
            {{ end }}
          mentionChannel: here
        disableResolveMessage: false

  - orgId: 1
    name: pagerduty-critical
    receivers:
      - uid: pagerduty-critical-receiver
        type: pagerduty
        settings:
          integrationKey: ${PAGERDUTY_INTEGRATION_KEY}
          severity: critical
          class: prometheus
          component: '{{ .GroupLabels.alertname }}'
          group: '{{ .GroupLabels.cluster }}'
        secureSettings:
          integrationKey: ${PAGERDUTY_INTEGRATION_KEY}
        disableResolveMessage: false

  - orgId: 1
    name: email-ops
    receivers:
      - uid: email-ops-receiver
        type: email
        settings:
          addresses: ops-team@example.com;oncall@example.com
          singleEmail: false
        disableResolveMessage: false

  - orgId: 1
    name: webhook-ops
    receivers:
      - uid: webhook-ops-receiver
        type: webhook
        settings:
          url: https://hooks.example.com/grafana-alerts
          httpMethod: POST
          maxAlerts: 10
        disableResolveMessage: false
