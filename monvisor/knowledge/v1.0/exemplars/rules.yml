# Prometheus alerting and recording rules — complete example
# Compatible with Prometheus v3.12.0
# Source: https://prometheus.io/docs/prometheus/latest/configuration/alerting_rules/

groups:

  # ── Recording rules ─────────────────────────────────────────────────────────
  - name: recording_rules
    interval: 1m
    rules:
      # Pre-compute per-job request rate
      - record: job:http_requests_total:rate5m
        expr: sum by (job) (rate(http_requests_total[5m]))

      # Pre-compute per-job error rate
      - record: job:http_request_errors_total:rate5m
        expr: sum by (job) (rate(http_requests_total{status_code=~"5.."}[5m]))

      # Node CPU idle percentage
      - record: instance:node_cpu_utilization:rate5m
        expr: |
          1 - avg by (instance) (
            rate(node_cpu_seconds_total{mode="idle"}[5m])
          )

  # ── Infrastructure alerts ────────────────────────────────────────────────────
  - name: infrastructure
    rules:
      # Any monitored target has been down for 5 minutes
      - alert: InstanceDown
        expr: up == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} is down"
          description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 5 minutes."

      # Node CPU usage > 90% for 10 minutes
      - alert: NodeHighCPU
        expr: instance:node_cpu_utilization:rate5m > 0.90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on {{ $labels.instance }}"
          description: "CPU usage is {{ $value | humanizePercentage }} on {{ $labels.instance }}"

      # Node memory available < 10%
      - alert: NodeLowMemory
        expr: |
          node_memory_MemAvailable_bytes
          / node_memory_MemTotal_bytes
          < 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low memory on {{ $labels.instance }}"
          description: "Only {{ $value | humanizePercentage }} memory available on {{ $labels.instance }}"

      # Filesystem > 85% full
      - alert: NodeFilesystemAlmostFull
        expr: |
          (
            node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs"}
            - node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs"}
          )
          / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs"}
          > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Filesystem almost full on {{ $labels.instance }}"
          description: "{{ $labels.mountpoint }} on {{ $labels.instance }} is {{ $value | humanizePercentage }} full"

  # ── HTTP / Application alerts ────────────────────────────────────────────────
  - name: http_alerts
    rules:
      # HTTP error rate > 5% for 5 minutes
      - alert: HighHTTPErrorRate
        expr: |
          (
            sum by (job) (rate(http_requests_total{status_code=~"5.."}[5m]))
            /
            sum by (job) (rate(http_requests_total[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP error rate for {{ $labels.job }}"
          description: "Error rate is {{ $value | humanizePercentage }} for {{ $labels.job }}"

  # ── Blackbox / probe alerts ──────────────────────────────────────────────────
  - name: probe_alerts
    rules:
      - alert: ProbeDown
        expr: probe_success == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Probe failed for {{ $labels.instance }}"
          description: "Blackbox probe to {{ $labels.instance }} has been failing for more than 5 minutes."

      - alert: SSLCertExpiringSoon
        expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 30
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "SSL cert expiring within 30 days for {{ $labels.instance }}"
          description: "SSL cert expires in {{ $value | humanizeDuration }}"

      - alert: SSLCertExpiryCritical
        expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 7
        for: 1h
        labels:
          severity: critical
        annotations:
          summary: "SSL cert expiring within 7 days for {{ $labels.instance }}"

  # ── Watchdog (dead man's switch) ─────────────────────────────────────────────
  - name: watchdog
    rules:
      - alert: Watchdog
        expr: vector(1)
        labels:
          severity: none
        annotations:
          summary: "Alerting pipeline is functional"
          description: "This alert always fires to confirm the alerting pipeline is working end-to-end."
