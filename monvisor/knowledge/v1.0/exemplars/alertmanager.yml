# Alertmanager complete configuration example
# Alertmanager v0.32.1
# Source: https://prometheus.io/docs/alerting/latest/configuration/

global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alertmanager@example.com'
  smtp_auth_username: 'alertmanager@example.com'
  smtp_auth_password: 'CHANGEME'
  smtp_require_tls: true

templates:
  - /etc/alertmanager/templates/*.tmpl

route:
  receiver: slack-default
  group_by: [alertname, cluster, service]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical alerts -> PagerDuty, fast
    - match:
        severity: critical
      receiver: pagerduty-critical
      group_wait: 10s
      repeat_interval: 1h
      continue: false

    # Database alerts -> DBA team Slack
    - match_re:
        service: ^(mysql|postgres|redis)$
      receiver: slack-dba
      repeat_interval: 2h

    # Watchdog (always firing, confirms pipeline is alive)
    - match:
        alertname: Watchdog
      receiver: "null"

receivers:
  - name: "null"

  - name: slack-default
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/CHANGEME'
        channel: '#alerts'
        icon_emoji: ':fire:'
        title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Instance:* {{ .Labels.instance }}
          {{ end }}
        send_resolved: true

  - name: slack-dba
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/CHANGEME_DBA'
        channel: '#dba-alerts'
        send_resolved: true

  - name: pagerduty-critical
    pagerduty_configs:
      - routing_key: 'CHANGEME_PAGERDUTY_KEY'
        description: '{{ .GroupLabels.alertname }}: {{ .CommonAnnotations.summary }}'
        severity: '{{ if .CommonLabels.severity }}{{ .CommonLabels.severity }}{{ else }}critical{{ end }}'
        send_resolved: true

  - name: email-ops
    email_configs:
      - to: 'ops-team@example.com'
        require_tls: true
        send_resolved: true

inhibit_rules:
  # Suppress warnings when critical fires for same component
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: [alertname, cluster, service]

  # Suppress all service alerts when the node is down
  - source_matchers:
      - alertname="NodeDown"
    target_matchers:
      - severity=~"warning|critical"
    equal: [instance]
