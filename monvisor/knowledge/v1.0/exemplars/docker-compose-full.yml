version: '3.8'

# docker-compose-full.yml — Production-like monitoring stack
# Prometheus 3.12.0 + Alertmanager 0.32.1 + Grafana 13.0.1
# Includes: node_exporter, blackbox_exporter, pushgateway
# Source: https://prometheus.io/docs/introduction/overview/

services:

  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - ./prometheus/certs:/etc/prometheus/certs:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - '9090:9090'
    networks:
      - monitoring
    depends_on:
      - alertmanager
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:9090/-/ready']
      interval: 30s
      timeout: 10s
      retries: 3

  alertmanager:
    image: prom/alertmanager:v0.32.1
    container_name: alertmanager
    restart: unless-stopped
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/templates:/etc/alertmanager/templates:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.listen-address=0.0.0.0:9093'
      - '--cluster.listen-address=0.0.0.0:9094'
    ports:
      - '9093:9093'
    networks:
      - monitoring
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:9093/-/ready']
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_admin_password
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=https://grafana.example.com
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.example.com:587
      - GF_SMTP_FROM_ADDRESS=grafana@example.com
      - GF_ALERTING_ENABLED=false
      - GF_UNIFIED_ALERTING_ENABLED=true
    secrets:
      - grafana_admin_password
    ports:
      - '3000:3000'
    networks:
      - monitoring
    depends_on:
      - prometheus
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3

  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /var/lib/node_exporter/textfile_collector:/textfile_collector:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.textfile.directory=/textfile_collector'
      - '--collector.systemd'
    ports:
      - '9100:9100'
    networks:
      - monitoring

  blackbox_exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox_exporter
    restart: unless-stopped
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'
    ports:
      - '9115:9115'
    networks:
      - monitoring

  pushgateway:
    image: prom/pushgateway:latest
    container_name: pushgateway
    restart: unless-stopped
    command:
      - '--persistence.file=/pushgateway/data'
      - '--persistence.interval=5m'
    volumes:
      - pushgateway_data:/pushgateway
    ports:
      - '9091:9091'
    networks:
      - monitoring

volumes:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  pushgateway_data:

networks:
  monitoring:
    driver: bridge

secrets:
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt

# Directory structure expected:
# .
# ├── docker-compose.yml
# ├── prometheus/
# │   ├── prometheus.yml
# │   ├── rules/
# │   │   └── rules.yml
# │   └── certs/              (optional TLS)
# ├── alertmanager/
# │   ├── alertmanager.yml
# │   └── templates/
# │       └── slack.tmpl
# ├── blackbox/
# │   └── blackbox.yml
# ├── grafana/
# │   ├── provisioning/
# │   │   ├── datasources/
# │   │   │   └── prometheus.yaml
# │   │   └── dashboards/
# │   │       └── dashboard.yaml
# │   └── dashboards/
# │       └── *.json
# └── secrets/
#     └── grafana_admin_password.txt
